<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 极致克制的LinkHub Logo - 几何字母组合 -->
  <rect width="256" height="256" fill="white"/>
  
  <!-- 背景圆 -->
  <circle cx="128" cy="128" r="100" stroke="black" stroke-width="4" fill="white"/>
  
  <!-- 字母L (左侧) -->
  <rect x="80" y="80" width="24" height="96" rx="4" fill="black"/>
  <rect x="80" y="152" width="64" height="24" rx="4" fill="black"/>
  
  <!-- 字母H (右侧) -->
  <rect x="152" y="80" width="24" height="96" rx="4" fill="black"/>
  <rect x="176" y="80" width="24" height="96" rx="4" fill="black"/>
  <rect x="152" y="116" width="48" height="24" rx="4" fill="black"/>
  
  <!-- 负空间装饰 -->
  <circle cx="128" cy="128" r="60" stroke="black" stroke-width="2" stroke-dasharray="4 4" fill="none"/>
  
  <!-- 连接点 (表示链接) -->
  <circle cx="104" cy="104" r="8" stroke="black" stroke-width="2" fill="white"/>
  <circle cx="152" cy="152" r="8" stroke="black" stroke-width="2" fill="white"/>
  <path d="M104 104L152 152" stroke="black" stroke-width="2" stroke-linecap="round" stroke-dasharray="4 4"/>
</svg>