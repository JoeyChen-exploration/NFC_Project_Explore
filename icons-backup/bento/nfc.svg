<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 极致克制的NFC图标 - 无线波/卡片 -->
  <rect width="64" height="64" fill="white"/>
  
  <!-- 卡片主体 -->
  <rect x="16" y="20" width="32" height="24" rx="4" stroke="black" stroke-width="2" fill="white"/>
  
  <!-- NFC芯片 -->
  <rect x="28" y="28" width="8" height="8" rx="1" stroke="black" stroke-width="1.5" fill="white"/>
  
  <!-- 无线波1 -->
  <path d="M32 20L32 16" stroke="black" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="32" cy="12" r="4" stroke="black" stroke-width="1.5" fill="white"/>
  
  <!-- 无线波2 -->
  <path d="M32 44L32 48" stroke="black" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="32" cy="52" r="4" stroke="black" stroke-width="1.5" fill="white"/>
  
  <!-- 信号线 -->
  <path d="M20 32L28 32M36 32L44 32" stroke="black" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- 连接点 -->
  <circle cx="20" cy="32" r="2" fill="black"/>
  <circle cx="44" cy="32" r="2" fill="black"/>
</svg>