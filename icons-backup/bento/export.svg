<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 极致克制的导出图标 - 上传箭头 -->
  <rect width="64" height="64" fill="white"/>
  
  <!-- 方框 -->
  <rect x="20" y="20" width="24" height="24" rx="4" stroke="black" stroke-width="2" fill="white"/>
  
  <!-- 上传箭头 -->
  <path d="M32 24L32 36" stroke="black" stroke-width="2" stroke-linecap="round"/>
  <path d="M28 28L32 24L36 28" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- 分享符号 -->
  <circle cx="44" cy="44" r="6" stroke="black" stroke-width="1.5" fill="white"/>
  <path d="M48 40L52 36M52 44L48 48" stroke="black" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- 连接线 -->
  <path d="M40 36L44 40M40 44L44 44" stroke="black" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="2 2"/>
  
  <!-- 文件图标 -->
  <rect x="24" y="28" width="16" height="12" rx="1" stroke="black" stroke-width="1" fill="white"/>
  <path d="M28 32H36M28 36H32" stroke="black" stroke-width="1" stroke-linecap="round"/>
</svg>